<div class="container">

    <div class="header">

        <h1>📚 My Library</h1>

        <a routerLink="/add-book" class="add-btn">
            + Add Book
        </a>

    </div>

    <div *ngIf="books.length === 0" class="empty">

        <h2>No books found.</h2>
        <p>Click "Add Book" to start building your library.</p>

    </div>

    <div class="book-grid">

        <div class="book-card" *ngFor="let book of books">

            <img
                [src]="book.coverUrl"
                [alt]="book.title">

            <h2>{{ book.title }}</h2>

            <p><strong>Author:</strong> {{ book.author }}</p>

            <p><strong>Genre:</strong> {{ book.genre }}</p>

            <p><strong>Year:</strong> {{ book.publicationYear }}</p>

            <p><strong>Status:</strong> {{ book.status }}</p>

            <p><strong>Rating:</strong> ⭐ {{ book.rating }}/5</p>

            <div class="actions">


                <button
                    class="edit-btn"
                    [routerLink]="['/edit-book', book.id]">
                    Edit
                </button>
            
                <button
                    class="delete-btn"
                    (click)="deleteBook(book.id)">
                    Delete
                </button>

            
            </div>

        </div>

    </div>

</div>
