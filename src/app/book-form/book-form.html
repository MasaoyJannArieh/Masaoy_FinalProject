<h2>Add New Book</h2>

<form (ngSubmit)="saveBook()">

  <label>Title</label>
  <input
    type="text"
    [(ngModel)]="book.title"
    name="title"
    required>

  <label>Author</label>
  <input
    type="text"
    [(ngModel)]="book.author"
    name="author"
    required>

  <label>Genre</label>
  <input
    type="text"
    [(ngModel)]="book.genre"
    name="genre">

  <label>Publication Year</label>
  <input
    type="number"
    [(ngModel)]="book.publicationYear"
    name="publicationYear">

  <label>Status</label>
  <select
    [(ngModel)]="book.status"
    name="status">

    <option>Want to Read</option>
    <option>Reading</option>
    <option>Completed</option>

  </select>

  <label>Rating</label>
  <input
    type="number"
    min="1"
    max="5"
    [(ngModel)]="book.rating"
    name="rating">

  <label>Cover URL</label>
  <input
    type="text"
    [(ngModel)]="book.coverUrl"
    name="coverUrl">

  <br><br>

  <button type="submit">
    Save Book
  </button>

</form>
